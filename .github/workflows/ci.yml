name: CI

# Valida que API y Web compilan en cada cambio antes de que Render despliegue a producción.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build API + Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API (NestJS)
        run: npm run api:build

      - name: Build Web (Angular)
        run: npm run web:build
